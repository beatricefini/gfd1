<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>AR Project 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    video#cameraVideo {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit: cover;
      z-index:-1;
    }
  </style>
</head>
<body>
  <!-- Sfondo AR -->
  <video id="cameraVideo" autoplay playsinline muted></video>

  <a-scene embedded renderer="alpha: true; antialias: true" vr-mode-ui="enabled: false">
    <!-- Camera più alta e inclinata verso il basso -->
    <a-camera id="camera" position="0 3 3" rotation="0 0 0" look-controls="enabled: false">
    </a-camera>

    <!-- Container per i modelli -->
    <a-entity id="modelsContainer"></a-entity>
  </a-scene>

  <!-- Script principale posizionato alla fine del body -->
  <script src="js/main.js"></script>

  <script>
    // Forza VR su GitHub Pages
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const scene = document.querySelector('a-scene');
      if (scene.enterVR) scene.enterVR();
    });
  </script>
</body>
</html>
